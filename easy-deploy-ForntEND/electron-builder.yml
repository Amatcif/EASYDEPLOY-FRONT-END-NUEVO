appId: com.easydeploy.desktop
productName: EasyDeploy
asar: true
buildVersion: 2.2.5.31

directories:
  output: dist_desktop

files:
  - dist/**/*
  - main.cjs
  - preload.js
  - package.json

extraResources:
  - from: backend_dist/EasyDeploy back.exe
    to: backend/EasyDeploy back.exe
    filter:
      - EasyDeploy back.exe

win:
  icon: ../Proyecto Phyton/APLICACION/iconos/logotipo.ico
  executableName: EasyDeploy
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: requireAdministrator
  artifactName: EasyDeploy_Setup_v2.2.5.31_${arch}.${ext}

nsis:
  include: build/installer.nsh
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EasyDeploy
  uninstallDisplayName: EasyDeploy
  deleteAppDataOnUninstall: false

extraMetadata:
  main: main.cjs
